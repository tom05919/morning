name: Morning daily report

on:
  workflow_dispatch:
  schedule:
    # Hourly at :12 UTC — combined with --require-local-hour 8 in agent timezone,
    # only the matching local 8 AM hour triggers real work (see personal-knowldge-website/agent/README.md).
    - cron: "12 * * * *"

permissions:
  contents: write

concurrency:
  group: morning-daily
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    # Required so secrets stored on the GitHub Environment "daily_summary" are exposed to this job.
    environment: daily_summary
    defaults:
      run:
        working-directory: personal-knowldge-website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent dependencies
        run: pip install -r agent/requirements.txt

      # Export to GITHUB_ENV so the value is reliably available to later steps (matches local ANTHROPIC_API_KEY).
      - name: Resolve Anthropic API key for this job
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          KEY="${ANTHROPIC_API_KEY}"
          if [ -z "$KEY" ]; then
            echo "::error::No Anthropic secret in scope. Add ANTHROPIC_API_KEY to the daily_summary environment (or repository Actions secrets). This job sets environment: daily_summary."
            exit 1
          fi
          echo "::add-mask::$KEY"
          {
            echo "ANTHROPIC_API_KEY<<ANTHROPIC_KEY_DELIM_V1"
            printf '%s\n' "$KEY"
            echo "ANTHROPIC_KEY_DELIM_V1"
          } >> "$GITHUB_ENV"
          echo "Resolved Anthropic credential (length ${#KEY})"

      # Manual "Run workflow" = no hour gate (so you can test anytime).
      # Scheduled cron = --require-local-hour 8 in agent/config.yaml timezone (saves API calls).
      - name: Run agent
        env:
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python agent/run_daily.py --config agent/config.yaml
          else
            python agent/run_daily.py --config agent/config.yaml --require-local-hour 8
          fi

      - name: Commit updated reports bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/reports.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(morning): refresh reports bundle"
            git push
          fi
